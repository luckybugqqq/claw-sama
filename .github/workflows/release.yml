name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-14
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      - name: Build Tauri app
        working-directory: app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: claw-sama-windows
          path: |
            app/src-tauri/target/x86_64-pc-windows-msvc/release/claw-sama.exe
            app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

      - name: Zip .app bundle (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          cd app/src-tauri/target/${{ matrix.target }}/release/bundle/macos
          for app in *.app; do
            zip -r "${app%.app}-${{ matrix.target }}.app.zip" "$app"
          done

      - name: Upload artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: claw-sama-macos-${{ matrix.target }}
          path: |
            app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.zip

      # Upload .app directory separately for npm packaging
      - name: Upload .app for npm (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: claw-sama-app-${{ matrix.target }}
          path: app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Place binaries for npm package
        run: |
          # Windows exe
          mkdir -p app/src-tauri/target/release
          cp artifacts/claw-sama-windows/app/src-tauri/target/x86_64-pc-windows-msvc/release/claw-sama.exe \
             app/src-tauri/target/release/claw-sama.exe

          # macOS .app bundles (architecture-specific names)
          mkdir -p app/src-tauri/target/release/bundle/macos

          # aarch64 (Apple Silicon)
          if [ -d "artifacts/claw-sama-app-aarch64-apple-darwin" ]; then
            app_dir=$(find artifacts/claw-sama-app-aarch64-apple-darwin -name '*.app' -type d | head -1)
            if [ -n "$app_dir" ]; then
              cp -r "$app_dir" app/src-tauri/target/release/bundle/macos/claw-sama-aarch64.app
            fi
          fi

          # x86_64 (Intel)
          if [ -d "artifacts/claw-sama-app-x86_64-apple-darwin" ]; then
            app_dir=$(find artifacts/claw-sama-app-x86_64-apple-darwin -name '*.app' -type d | head -1)
            if [ -n "$app_dir" ]; then
              cp -r "$app_dir" app/src-tauri/target/release/bundle/macos/claw-sama-x86_64.app
            fi
          fi

          echo "=== npm package contents ==="
          find app/src-tauri/target/release -type f | head -20

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
