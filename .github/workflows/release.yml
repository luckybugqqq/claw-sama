name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-14
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      - name: Build Tauri app
        working-directory: app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: claw-sama-windows
          path: |
            app/src-tauri/target/x86_64-pc-windows-msvc/release/claw-sama.exe
            app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

      - name: Zip .app bundle (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          cd app/src-tauri/target/${{ matrix.target }}/release/bundle/macos
          for app in *.app; do
            zip -r "${app%.app}-${{ matrix.target }}.app.zip" "$app"
          done

      - name: Upload artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: claw-sama-macos-${{ matrix.target }}
          path: |
            app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.zip

      # Upload raw binary for npm packaging (avoids .app signing/permission issues)
      - name: Upload raw binary for npm (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: claw-sama-bin-${{ matrix.target }}
          path: app/src-tauri/target/${{ matrix.target }}/release/claw-sama

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f -o -type d | head -50

      - name: Place binaries for npm package
        run: |
          mkdir -p app/src-tauri/target/release

          # Windows exe
          exe=$(find artifacts -name 'claw-sama.exe' -type f | head -1)
          if [ -n "$exe" ]; then
            cp "$exe" app/src-tauri/target/release/claw-sama.exe
            echo "Found exe: $exe"
          else
            echo "WARNING: claw-sama.exe not found"
          fi

          # macOS raw binaries (no .app bundle — avoids signing & permission issues)
          for arch in aarch64 x86_64; do
            bin=$(find artifacts -path "*${arch}*" -name 'claw-sama' -type f | head -1)
            if [ -n "$bin" ]; then
              cp "$bin" "app/src-tauri/target/release/claw-sama-${arch}-apple-darwin"
              chmod +x "app/src-tauri/target/release/claw-sama-${arch}-apple-darwin"
              echo "Found ${arch} binary: $bin"
            else
              echo "WARNING: ${arch} binary not found"
            fi
          done

          echo "=== npm package contents ==="
          find app/src-tauri/target/release -type f | head -20

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
